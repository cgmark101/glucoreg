<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GlucoReg — Perfil</title>
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="/style.css?v=2">
<link rel="apple-touch-icon" href="/icon.svg">
</head>
<body>
<div id="page-loader"><div class="spinner"></div><span>Cargando...</span></div>
<div class="container">
  <div class="app-header">
    <h1>GlucoReg</h1>
    <div class="user-badge">
      <span id="user-name"></span>
      <div style="position:relative">
        <div class="menu-dots" onclick="toggleMenu()">⋯</div>
        <div class="menu-dropdown" id="menu-dropdown">
          <button onclick="handleLogout()" style="color:var(--danger)">🚪 Salir</button>
        </div>
      </div>
    </div>
  </div>

  <div class="tab-bar">
    <button onclick="navTo('glucose.html')">Glucosa</button>
    <button onclick="navTo('pressure.html')">Presión</button>
  </div>

  <div class="section-title">Mi Perfil</div>

  <div class="add-card">
    <p style="color:var(--muted);margin-bottom:16px;font-size:.9rem">
      Configurá tu número de WhatsApp para recibir resúmenes semanales con tus métricas.
    </p>
    <div class="form-group">
      <label>WhatsApp (con código de país)</label>
      <input type="tel" id="profile-phone" placeholder="584121234567" style="width:100%">
      <span style="font-size:.75rem;color:var(--muted)">Ej: 584121234567 (Venezuela), 5491112345678 (Argentina)</span>
    </div>
    <div class="form-group">
      <label>Correo electrónico</label>
      <input type="email" id="profile-email" placeholder="usuario@correo.com" style="width:100%">
    </div>
    <button class="btn btn-primary" onclick="saveProfile()" id="profile-save">Guardar</button>
    <span id="profile-status" style="margin-left:12px;font-size:.9rem"></span>
  </div>
</div>

<div id="toast" class="toast"></div>
<div id="error-msg" class="error-msg" style="display:none;position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:200;max-width:480px;width:90%"></div>

<script src="/shared.js?v=2"></script>
<script>
checkAuth();

async function loadProfile() {
  try {
    const res = await fetch(API + '/auth/profile', { headers: { 'Authorization': 'Bearer ' + token } });
    const data = await res.json();
    if (!res.ok) { showError(data.error); return; }
    document.getElementById('profile-phone').value = data.user.phone || '';
    document.getElementById('profile-email').value = data.user.email || '';
  } catch(e) { showError('Error al cargar perfil'); }
}

async function saveProfile() {
  const phone = document.getElementById('profile-phone').value.trim();
  const email = document.getElementById('profile-email').value.trim();
  const btn = document.getElementById('profile-save');
  const status = document.getElementById('profile-status');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';
  status.textContent = '';
  try {
    const res = await fetch(API + '/auth/profile', {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify({ phone: phone || null, email: email || null }),
    });
    const data = await res.json();
    if (!res.ok) { showError(data.error); btn.disabled=false; btn.textContent='Guardar'; return; }
    status.textContent = '✓ Guardado';
    status.style.color = 'var(--good)';
    showToast('✓ Perfil actualizado', 'success');
  } catch(e) { showError('Error'); }
  btn.disabled = false;
  btn.textContent = 'Guardar';
  setTimeout(() => status.textContent = '', 3000);
}

loadProfile();
</script>
<script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
</body>
</html>
