<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GlucoReg — Admin</title>
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="/style.css?v=5">
<link rel="apple-touch-icon" href="/icon.svg">
</head>
<body>
<div id="page-loader"><div class="spinner"></div><span>Cargando...</span></div>
<div class="container">
  <div class="app-header">
    <h1><a href="/" class="brand-link">GlucoReg</a></h1>
    <div class="user-badge">
      <span id="user-name"></span>
      <div style="position:relative">
        <div class="menu-dots" onclick="toggleMenu()">⋯</div>
        <div class="menu-dropdown" id="menu-dropdown">
          <button onclick="handleLogout()" style="color:var(--danger)">🚪 Salir</button>
        </div>
      </div>
    </div>
  </div>

  <div class="admin-layout" style="margin-top:0">
    <div class="admin-sidebar" id="admin-sidebar">
      <button class="admin-nav-btn active" data-section="dashboard" onclick="switchSection('dashboard')">📊 Dashboard</button>
      <button class="admin-nav-btn" data-section="users" onclick="switchSection('users')">👥 Usuarios</button>
      <button class="admin-nav-btn" data-section="broadcast" onclick="switchSection('broadcast')">📢 Broadcast</button>
      <button class="admin-nav-btn" data-section="logs" onclick="switchSection('logs')">📋 Logs</button>
    </div>
    <div class="admin-content">
      <div id="section-dashboard" class="admin-section active">
        <div id="dash-loading" style="text-align:center;padding:32px;color:var(--muted)"><span class="spinner"></span> Cargando...</div>
        <div id="dash-content"></div>
      </div>
      <div id="section-users" class="admin-section">
        <div id="admin-loading" style="text-align:center;padding:32px;color:var(--muted)"><span class="spinner"></span> Cargando...</div>
        <div id="admin-content"></div>
      </div>
      <div id="section-broadcast" class="admin-section">
        <div id="broadcast-content"></div>
      </div>
      <div id="section-logs" class="admin-section">
        <div id="logs-loading" style="text-align:center;padding:32px;color:var(--muted)"><span class="spinner"></span> Cargando...</div>
        <div id="logs-content"></div>
      </div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <h3 id="modal-title">Editar usuario</h3>
    <div id="modal-body"></div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="modal-save" onclick="saveUser()">Guardar</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>
<div id="error-msg" class="error-msg" style="display:none;position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:200;max-width:480px;width:90%"></div>

<script src="/shared.js?v=2"></script>
<script>
checkAuth();

let editingUser = null;
let usersData = [];
let currentSection = 'dashboard';

async function switchSection(section) {
  currentSection = section;
  document.querySelectorAll('.admin-nav-btn').forEach(b => b.classList.toggle('active', b.dataset.section === section));
  document.querySelectorAll('.admin-section').forEach(s => s.classList.toggle('active', s.id === 'section-' + section));
  if (section === 'dashboard' && !document.getElementById('dash-content').innerHTML) loadDashboard();
  if (section === 'users' && !document.getElementById('admin-content').innerHTML) loadAdmin();
  if (section === 'broadcast') {
    if (!document.getElementById('broadcast-content').innerHTML) {
      if (usersData.length === 0) await loadAdmin();
      initBroadcast();
    }
  }
  if (section === 'logs') loadLogs();
}

function closeModal() { document.getElementById('modal').classList.remove('show'); }

function openEdit(user) {
  editingUser = user;
  document.getElementById('modal-title').textContent = 'Editar: ' + user.username;
  document.getElementById('modal-body').innerHTML = `
    <div class="form-group"><label>Username</label><input type="text" id="edit-username" value="${user.username}"></div>
    <div class="form-group"><label>Rol</label>
      <select id="edit-role">
        <option value="user" ${user.role==='user'?'selected':''}>Usuario normal</option>
        <option value="admin" ${user.role==='admin'?'selected':''}>Administrador</option>
      </select>
    </div>
    <div class="form-group"><label>WhatsApp</label><input type="tel" id="edit-phone" value="${user.phone||''}" placeholder="584121234567"></div>
    <div class="form-group"><label>Email</label><input type="email" id="edit-email" value="${user.email||''}" placeholder="usuario@correo.com"></div>
  `;
  document.getElementById('modal').classList.add('show');
}

async function saveUser() {
  const u = document.getElementById('edit-username').value;
  const role = document.getElementById('edit-role').value;
  const phone = document.getElementById('edit-phone').value.trim();
  const email = document.getElementById('edit-email').value.trim();
  const btn = document.getElementById('modal-save');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>';
  try {
    const res = await fetch(API + '/admin/users/' + editingUser.id, {
      method:'PATCH', headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
      body: JSON.stringify({ username:u, role, phone: phone || null, email: email || null })
    });
    const data = await res.json();
    if (!res.ok) { showError(data.error); btn.disabled=false; btn.textContent='Guardar'; return; }
    closeModal();
    showToast('✓ Usuario actualizado', 'success');
    loadAdmin(); loadDashboard();
  } catch(e) { showError('Error'); btn.disabled=false; btn.textContent='Guardar'; }
}

async function deleteUser(id, uname) {
  if (!confirm('¿Eliminar a "' + uname + '" y todos sus datos? No se puede deshacer.')) return;
  try {
    const res = await fetch(API + '/admin/users/' + id, {
      method:'DELETE', headers:{'Authorization':'Bearer '+token}
    });
    const data = await res.json();
    if (!res.ok) { showError(data.error); return; }
    showToast('✓ ' + data.message, 'success');
    loadAdmin(); loadDashboard();
  } catch(e) { showError('Error'); }
}

async function loadDashboard() {
  document.getElementById('dash-loading').style.display = 'block';
  document.getElementById('dash-content').innerHTML = '';
  try {
    const res = await fetch(API + '/admin/users', { headers:{'Authorization':'Bearer '+token} });
    const data = await res.json();
    if (!res.ok) { document.getElementById('dash-loading').textContent = 'Error: ' + (data.error||'desconocido'); return; }
    document.getElementById('dash-loading').style.display = 'none';
    const users = data.users || [];
    const totalReadings = users.reduce((s,u) => s + (u.readings||0), 0);
    const totalBp = users.reduce((s,u) => s + (u.blood_pressure||0), 0);
    const admins = users.filter(u => u.role === 'admin').length;
    const withPhone = users.filter(u => u.phone).length;
    document.getElementById('dash-content').innerHTML = `
      <div class="admin-stats">
        <div class="admin-stat"><div class="num">${users.length}</div><div class="lbl">Usuarios</div></div>
        <div class="admin-stat"><div class="num">${admins}</div><div class="lbl">Admins</div></div>
        <div class="admin-stat"><div class="num">${totalReadings}</div><div class="lbl">Lecturas glucosa</div></div>
        <div class="admin-stat"><div class="num">${totalBp}</div><div class="lbl">Mediciones presión</div></div>
      </div>
      <div class="admin-card">
        <h3>📱 WhatsApp configurado</h3>
        <p style="color:var(--muted);font-size:.9rem">${withPhone} de ${users.length} usuarios tienen teléfono registrado para notificaciones.</p>
      </div>
      <div class="admin-card">
        <h3>👥 Últimos usuarios</h3>
        ${users.slice(0,5).map(u => `
          <div class="metric-row" style="margin-bottom:4px">
            <div class="icon">${u.role === 'admin' ? '👑' : '👤'}</div>
            <div class="info">
              <div class="label">${u.username} ${u.username === username ? '<span class="badge warn" style="font-size:.6rem;padding:1px 6px">Tú</span>' : ''}</div>
              <div class="sub">${u.readings} lecturas · ${u.blood_pressure} presiones · ${u.created_at ? u.created_at.slice(0,10) : '—'}</div>
            </div>
          </div>
        `).join('')}
      </div>
    `;
  } catch(e) { document.getElementById('dash-loading').textContent = 'Error de conexión'; }
}

async function loadAdmin() {
  try {
    const res = await fetch(API + '/admin/users', { headers:{'Authorization':'Bearer '+token} });
    const data = await res.json();
    if (!res.ok) { document.getElementById('admin-loading').textContent = 'Error: ' + (data.error||'desconocido'); return; }
    document.getElementById('admin-loading').style.display = 'none';
    usersData = data.users;
    document.getElementById('admin-content').innerHTML = `
      <div class="section-title">Usuarios (${usersData.length})</div>
      ${usersData.map(u => `
        <div class="admin-user-card">
          <div class="avatar">${u.role === 'admin' ? '👑' : '👤'}</div>
          <div class="info">
            <div class="name">
              ${u.username}
              ${u.role === 'admin' ? '<span class="badge good" style="font-size:.65rem;padding:2px 6px;margin-left:6px">Admin</span>' : ''}
              ${u.username === username ? '<span class="badge warn" style="font-size:.65rem;padding:2px 6px;margin-left:4px">Tú</span>' : ''}
            </div>
            <div class="meta">
              <span>📊 ${u.readings} glucosa</span>
              <span>❤️ ${u.blood_pressure} presión</span>
              ${u.phone ? '<span>📱 '+u.phone+'</span>' : ''}
              ${u.email ? '<span>✉️ '+u.email+'</span>' : ''}
              <span>📅 ${u.created_at ? u.created_at.slice(0,10) : '—'}</span>
            </div>
          </div>
          ${u.username !== username ? `
          <div class="actions">
            <button onclick='openEdit(${JSON.stringify(u).replace(/'/g,"&#39;")})'>✏️ Editar</button>
            <button class="danger-btn" onclick="deleteUser(${u.id},'${u.username}')">🗑️</button>
          </div>` : ''}
        </div>
      `).join('')}
    `;
  } catch(e) { document.getElementById('admin-loading').textContent = 'Error de conexión'; }
}

function initBroadcast() {
  const phoneUsers = usersData.filter(u => u.phone);
  document.getElementById('broadcast-content').innerHTML = `
    <div class="admin-card broadcast-area">
      <h3>📢 Broadcast WhatsApp</h3>
      <div class="broadcast-info">
        Enviar mensaje a <strong>${phoneUsers.length} usuario(s)</strong> con WhatsApp configurado.
      </div>
      <div class="admin-card" style="background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.3);margin-bottom:16px">
        <p style="font-size:.85rem;color:#fbbf24">
        ⚠️ WhatsApp detecta envíos masivos como uso automatizado y puede bloquear el número.
        Usá delays altos (3-10s), no mandes a más de 20-30 personas seguidas,
        y espaciá los broadcasts por horas.
        </p>
      </div>
      <div class="form-group" style="max-width:220px">
        <label>Delay entre mensajes</label>
        <div style="display:flex;gap:8px;align-items:center">
          <input type="number" id="broadcast-delay" value="3000" min="1000" max="30000" step="500">
          <span style="color:var(--muted);font-size:.85rem">ms</span>
        </div>
      </div>
      <textarea id="broadcast-msg" rows="4" placeholder="Escribí el mensaje a enviar..."></textarea>
      <button class="btn btn-primary" onclick="sendBroadcast()" id="broadcast-btn" style="margin-top:12px">Enviar Broadcast</button>
      <div class="broadcast-status" id="broadcast-status"></div>
    </div>
  `;
}

async function loadLogs(page) {
  page = page || 0;
  document.getElementById('logs-loading').style.display = 'block';
  document.getElementById('logs-content').innerHTML = '';
  try {
    const res = await fetch(API + '/admin/logs?page=' + page, { headers:{'Authorization':'Bearer '+token} });
    const data = await res.json();
    if (!res.ok) { document.getElementById('logs-loading').textContent = 'Error: ' + (data.error||'desconocido'); return; }
    document.getElementById('logs-loading').style.display = 'none';
    const logs = data.logs || [];
    const totalPages = Math.ceil((data.total || 0) / data.limit);
    document.getElementById('logs-content').innerHTML = `
      <div class="section-title">Auditoría (${data.total} registros)</div>
      ${logs.length === 0 ? '<div class="empty-state" style="padding:24px"><p>Sin registros aún</p></div>' : ''}
      ${logs.map(l => `
        <div class="metric-row" style="margin-bottom:4px;padding:12px 16px">
          <div class="info">
            <div class="value" style="font-size:.85rem">
              <span style="color:var(--accent)">${l.action}</span>
              <span style="color:var(--muted);font-weight:400;font-size:.8rem">— ${l.username}</span>
            </div>
            <div class="sub">${l.detail || ''}</div>
            <div class="sub" style="margin-top:2px;font-size:.7rem;color:var(--surface2)">${l.created_at}</div>
          </div>
        </div>
      `).join('')}
      ${totalPages > 1 ? `
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:16px">
        <button class="btn btn-outline" onclick="loadLogs(${page - 1})" style="width:auto;padding:8px 16px;font-size:.85rem" ${page === 0 ? 'disabled' : ''}>← Anterior</button>
        <span style="font-size:.85rem;color:var(--muted)">Página ${page + 1} de ${totalPages}</span>
        <button class="btn btn-outline" onclick="loadLogs(${page + 1})" style="width:auto;padding:8px 16px;font-size:.85rem" ${page + 1 >= totalPages ? 'disabled' : ''}>Siguiente →</button>
      </div>` : ''}
    `;
  } catch(e) { document.getElementById('logs-loading').textContent = 'Error de conexión'; }
}

async function sendBroadcast() {
  const msg = document.getElementById('broadcast-msg').value.trim();
  if (!msg) { showError('Escribí un mensaje'); return; }
  const delayMs = parseInt(document.getElementById('broadcast-delay').value) || 3000;
  const totalUsers = usersData.filter(u => u.phone).length;
  if (!confirm(`¿Enviar a ${totalUsers} usuario(s) con ${delayMs}ms de delay (~${Math.ceil(totalUsers * delayMs / 1000)}s total)? WhatsApp puede bloquear el número si el envío es muy rápido.`)) return;
  const btn = document.getElementById('broadcast-btn');
  const status = document.getElementById('broadcast-status');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>';
  status.textContent = 'Enviando...'; status.style.color = 'var(--muted)';
  try {
    const res = await fetch(API + '/admin/broadcast', {
      method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
      body: JSON.stringify({ message: msg, delay_ms: delayMs }),
    });
    const data = await res.json();
    if (!res.ok) { showError(data.error); btn.disabled=false; btn.textContent='Enviar Broadcast'; status.textContent=''; return; }
    status.textContent = '✓ ' + data.message;
    status.style.color = 'var(--success)';
    document.getElementById('broadcast-msg').value = '';
  } catch(e) { showError('Error'); }
  btn.disabled = false; btn.textContent = 'Enviar Broadcast';
  setTimeout(() => status.textContent = '', 5000);
}

if (userRole !== 'admin') {
  document.querySelector('.admin-layout').innerHTML = '<div class="admin-card" style="text-align:center;padding:40px"><p style="font-size:1.2rem;margin-bottom:8px">🔒</p><p style="color:var(--muted)">Acceso denegado — solo administradores</p></div>';
} else {
  switchSection('dashboard');
}
</script>
<script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
</body>
</html>
