<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GlucoReg — Glucosa</title>
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="/style.css?v=2">
<link rel="apple-touch-icon" href="/icon.svg">
</head>
<body>
<div id="page-loader"><div class="spinner"></div><span>Cargando...</span></div>
<div class="container">
  <div class="app-header">
    <h1>GlucoReg</h1>
    <div class="user-badge">
      <span id="user-name"></span>
      <button class="logout-btn" onclick="navTo('dashboard.html')">📊</button>
      <div style="position:relative">
        <div class="menu-dots" onclick="toggleMenu()">⋯</div>
        <div class="menu-dropdown" id="menu-dropdown">
          <button onclick="navTo('import.html')">📥 Importar CSV</button>
          <button onclick="handleLogout()" style="color:var(--danger)">🚪 Salir</button>
        </div>
      </div>
    </div>
  </div>

  <div class="tab-bar">
    <button class="active">Glucosa</button>
    <button onclick="navTo('pressure.html')">Presión</button>
  </div>

  <div class="add-card">
    <h2>Nueva lectura</h2>
    <div class="add-row">
      <div class="form-group">
        <label>Glucosa (mg/dL)</label>
        <input type="number" id="new-value" placeholder="95" min="1" step="1" required>
      </div>
      <div class="form-group">
        <label>Fecha y hora</label>
        <input type="datetime-local" id="new-datetime" onchange="suggestContext('new-datetime','new-context')">
      </div>
      <div class="form-group" style="flex:0.8">
        <label>Contexto</label>
        <select id="new-context" style="width:100%;padding:12px 16px;border:1px solid var(--surface2);border-radius:10px;background:var(--surface);color:var(--text);font-size:0.9rem">
          <option value="fasting">En ayunas</option>
          <option value="before_meal">Antes de comer</option>
          <option value="after_meal">Después de comer</option>
          <option value="bedtime">Al acostarse</option>
          <option value="other">Otro</option>
        </select>
      </div>
      <button class="btn btn-primary" onclick="handleAddReading()">Registrar</button>
    </div>
  </div>

  <div class="filter-chip" onclick="toggleHistory()" style="display:flex;justify-content:space-between;align-items:center;width:100%;padding:12px 16px;border-radius:10px;border:1px solid var(--surface2);background:var(--surface);color:var(--text);font-size:.9rem;font-weight:600;cursor:pointer;margin-bottom:8px">
    <span>📋 Historial</span>
    <span id="history-toggle">▶</span>
  </div>

  <div id="history-section" style="display:none">
    <div class="filter-card" style="margin-bottom:12px">
      <div class="filter-quick">
        <button class="filter-chip active" onclick="setFilter('all')">Todo</button>
        <button class="filter-chip" onclick="setFilter('today')">Hoy</button>
        <button class="filter-chip" onclick="setFilter('7d')">7 días</button>
        <button class="filter-chip" onclick="setFilter('30d')">30 días</button>
      </div>
      <div class="filter-custom">
        <div class="form-group"><label>Desde</label><input type="date" id="filter-from" onchange="applyFilterDates()"></div>
        <div class="form-group"><label>Hasta</label><input type="date" id="filter-to" onchange="applyFilterDates()"></div>
        <button class="btn btn-outline" onclick="clearFilters()" style="width:auto;padding:8px 16px;margin-top:auto">Limpiar</button>
      </div>
    </div>
    <div class="readings-header"><h2>Lecturas</h2><span class="count" id="total-count">0</span></div>
    <div id="readings-list"></div>
    <div id="pagination" style="display:flex;justify-content:space-between;align-items:center;margin-top:16px">
      <button class="btn btn-outline" id="prev-page" onclick="changePage(-1)" style="width:auto;padding:8px 16px;font-size:.85rem">← Anterior</button>
      <span id="page-info" style="font-size:.85rem;color:var(--muted)">Página 1</span>
      <button class="btn btn-outline" id="next-page" onclick="changePage(1)" style="width:auto;padding:8px 16px;font-size:.85rem">Siguiente →</button>
    </div>
    <div id="empty-state" class="empty-state" style="display:none"><p>Sin lecturas aún</p><p class="hint">Registrá tu primer valor arriba</p></div>
  </div>
</div>

<div id="toast" class="toast"></div>
<div id="error-msg" class="error-msg" style="display:none;position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:200;max-width:480px;width:90%"></div>

<script src="/shared.js?v=2"></script>
<script>
checkAuth();

const PAGE_SIZE = 10;
let currentPage = 0;
let activeRange = 'all';
let customFrom = '';
let customTo = '';

function getFilterParams() {
  const p = new URLSearchParams();
  p.set('limit', String(PAGE_SIZE));
  p.set('offset', String(currentPage * PAGE_SIZE));
  if (activeRange === 'today') {
    const t = new Date().toISOString().slice(0,10);
    p.set('from', t+'T00:00:00.000Z'); p.set('to', t+'T23:59:59.999Z');
  } else if (activeRange === '7d') { p.set('from', new Date(Date.now()-7*86400000).toISOString()); }
  else if (activeRange === '30d') { p.set('from', new Date(Date.now()-30*86400000).toISOString()); }
  else if (activeRange === 'custom') {
    if (customFrom) p.set('from', customFrom+'T00:00:00.000Z');
    if (customTo) p.set('to', customTo+'T23:59:59.999Z');
  }
  return p;
}

function setFilter(range) {
  activeRange = range;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.toggle('active', c.textContent === (range==='all'?'Todo':range==='today'?'Hoy':range==='7d'?'7 días':'30 días')));
  if (range !== 'custom') { document.getElementById('filter-from').value=''; document.getElementById('filter-to').value=''; customFrom=''; customTo=''; }
  currentPage = 0; if (!historyVisible) toggleHistory(); else loadReadings();
}

function applyFilterDates() {
  customFrom = document.getElementById('filter-from').value;
  customTo = document.getElementById('filter-to').value;
  setFilter(customFrom||customTo ? 'custom' : 'all');
}

function clearFilters() { setFilter('all'); }

let historyVisible = false;

function toggleHistory() {
  historyVisible = !historyVisible;
  document.getElementById('history-section').style.display = historyVisible ? 'block' : 'none';
  document.getElementById('history-toggle').textContent = historyVisible ? '▼' : '▶';
  if (historyVisible) loadReadings();
}

async function loadReadings() {
  const offset = currentPage * PAGE_SIZE;
  try {
    const res = await fetch(API + '/readings?' + getFilterParams(), { headers:{'Authorization':'Bearer '+token} });
    const data = await res.json();
    if (!res.ok) return;
    const total = data.total || 0;
    document.getElementById('total-count').textContent = total;
    const list = document.getElementById('readings-list');
    const empty = document.getElementById('empty-state');
    if (total === 0) { list.innerHTML=''; empty.style.display='block'; const pg = document.getElementById('pagination'); if (pg) pg.style.display='none'; return; }
    empty.style.display='none';
    const tp = Math.max(1, Math.ceil(total/PAGE_SIZE));
    document.getElementById('page-info').textContent = `Página ${currentPage+1} de ${tp}`;
    document.getElementById('prev-page').disabled = currentPage === 0;
    document.getElementById('next-page').disabled = offset + PAGE_SIZE >= total;
    list.innerHTML = data.readings.map(r => {
      const fmt = formatDate(r.recorded_at);
      return `<div class="reading-item"><div><div class="reading-value">${r.value} <span class="unit">mg/dL</span></div><div style="font-size:.7rem;color:var(--muted);margin-top:2px">${CTX_LABELS[r.context]||r.context}</div></div><div style="display:flex;align-items:center;gap:12px"><div class="reading-meta"><div class="date">${fmt.date}</div><div>${fmt.time}</div></div><button class="reading-delete" onclick="handleDelete(${r.id})" title="Eliminar">✕</button></div></div>`;
    }).join('');
  } catch(e) { showError('Error al cargar'); }
}

function changePage(delta) { currentPage = Math.max(0, currentPage + delta); loadReadings(); }

async function handleAddReading() {
  const val = parseFloat(document.getElementById('new-value').value);
  if (!val || val <= 0) { showError('Valor inválido'); return; }
  const btn = document.querySelector('.add-card .btn-primary');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>';
  const body = { value:val, context:document.getElementById('new-context').value, tz_offset:-new Date().getTimezoneOffset() };
  const dt = document.getElementById('new-datetime').value;
  if (dt) body.recorded_at = new Date(dt).toISOString();
  try {
    const res = await fetch(API + '/readings', {
      method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+token}, body:JSON.stringify(body)
    });
    const data = await res.json();
    if (!res.ok) { btn.disabled=false; btn.textContent='Registrar'; showError(data.error); return; }
    document.getElementById('new-value').value=''; document.getElementById('new-datetime').value='';
    showToast('✓ Registrado','success'); currentPage=0;
    if (!historyVisible) toggleHistory(); else loadReadings();
  } catch(e) { showError('Error de conexión'); }
  btn.disabled = false; btn.textContent = 'Registrar';
}

async function handleDelete(id) {
  if (!confirm('¿Eliminar?')) return;
  try {
    const res = await fetch(API + '/readings/'+id, { method:'DELETE', headers:{'Authorization':'Bearer '+token} });
    if (!res.ok) return;
    showToast('✓ Eliminada','success'); currentPage=0;
    if (!historyVisible) toggleHistory(); else loadReadings();
  } catch(e) { showError('Error de conexión'); }
}

loadReadings();
</script>
<script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
</body>
</html>
